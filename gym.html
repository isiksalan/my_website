<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gym tracker</title>
    <link rel="icon" href="images/logo.svg" type="image/svg">
    <style>
    
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
        cursor: url('etc/cursor-index.gif'), auto;
        font-family: 'Press Start 2P', cursive;
        box-sizing: border-box;
    }

    *:active {
        cursor: url('etc/cursor-index.gif'), auto !important;
    }

    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #d4a574;
        background-image: url('backgrounds/back-142.gif');
        background-repeat: repeat;
        background-size: auto;
        background-position: center;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 10px 20px;
        background-color: rgba(255, 192, 203, 0.9);
        background-image: url('backgrounds/back-158.gif');
        background-repeat: repeat;
        background-size: auto;
        background-position: center;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        z-index: 100;
        border-bottom: 3px solid #ff69b4;
    }

    h1 {
        font-family: 'Press Start 2P', cursive;
        font-size: clamp(0.8rem, 3vw, 1.5rem);
        color: #000000;
        margin: 0;
        max-width: 70%;
        word-wrap: break-word;
        text-shadow: 8px 8px 0px #fff, 8px 8px 0px rgba(0,0,0,0.2);
    }

    .header-button-container {
        display: flex;
        align-items: center;
    }

    .header-btn {
        width: auto;
        max-width: 120px;
        height: 40px;
        padding: 0 15px;
        font-size: clamp(0.4rem, 1.2vw, 0.7rem);
        white-space: nowrap;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .btn {  
        font-family: 'Press Start 2P', cursive;
    }  

    .btn-layered-3d {  
        width: 180px;  
        position: relative;  
        display: inline-block;  
        cursor: pointer;  
        outline: none;
        vertical-align: middle;  
        text-decoration: none;  
        font-size: 0.9rem;  
        font-family: 'Press Start 2P', cursive;  
        font-weight: 600;  
        text-transform: uppercase;  
        padding: 0.8em 1.5em;  
        border-radius: 10px;  
        background: linear-gradient(to bottom, #ffc0cb, #ff69b4);
        border: 3px solid;
        border-color: #fff #c71585 #c71585 #fff;
        color: #800080;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.6);
        box-shadow: 
            0px 0px 0px 1px rgba(0,0,0,0.2),
            3px 3px 5px rgba(0,0,0,0.3),
            inset 0px 1px 1px rgba(255,255,255,0.9);
        transition: all 0.2s ease;
    }

    .btn-layered-3d:hover {
        background: linear-gradient(to bottom, #ffb6c1, #ff1493);
        transform: translateY(-2px);
        box-shadow: 
            0px 0px 0px 1px rgba(0,0,0,0.2),
            4px 4px 8px rgba(0,0,0,0.3),
            inset 0px 1px 1px rgba(255,255,255,0.9);
    } 
    
    .btn-layered-3d:active {
        background: linear-gradient(to bottom, #ff69b4, #c71585);
        border-color: #c71585 #fff #fff #c71585;
        transform: translateY(3px);
    }

    .btn-layered-3d--pink {
        background: linear-gradient(to bottom, #ffc0cb, #ff69b4);
        color: #800080;
        border-color: #fff #c71585 #c71585 #fff;
    }  

    .btn-layered-3d--pink:hover {
        background: linear-gradient(to bottom, #ffb6c1, #ff1493);
    }
    
    .btn-layered-3d--pink:active {
        background: linear-gradient(to bottom, #ff69b4, #c71585);
        border-color: #c71585 #fff #fff #c71585;
    }

    .content-wrapper {
        padding-top: 100px;
        padding-bottom: 40px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .tracker-container {
        max-width: 500px;
        width: 90%;
        text-align: center;
        background: linear-gradient(135deg, rgba(40,40,40,0.95), rgba(20,20,20,0.95));
        border-radius: 5px;
        padding: 40px;
        margin: 20px;
        box-shadow: 
            0 8px 32px rgba(0,0,0,0.5),
            inset 0 1px 1px rgba(255,255,255,0.1);
        border: 3px solid #444;
    }

    .tracker-title {
        font-size: clamp(0.7rem, 2vw, 1rem);
        color: #ff69b4;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .main-counter-label {
        font-size: clamp(0.5rem, 1.2vw, 0.7rem);
        color: #888;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .main-counter {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        color: #00ff00;
        text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        margin: 15px 0;
        font-family: 'Press Start 2P', cursive;
    }

    .counter-unit {
        font-size: clamp(0.6rem, 1.5vw, 0.9rem);
        color: #666;
        margin-top: 5px;
    }

    .divider {
        width: 80%;
        height: 2px;
        background: linear-gradient(to right, transparent, #444, transparent);
        margin: 30px auto;
    }

    .snack-section {
        margin-top: 20px;
    }

    .snack-label {
        font-size: clamp(0.45rem, 1vw, 0.6rem);
        color: #666;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .snack-counter {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        color: #ffcc00;
        text-shadow: 0 0 8px #ffcc00;
        font-family: 'Press Start 2P', cursive;
    }

    .status-text {
        font-size: clamp(0.4rem, 0.9vw, 0.55rem);
        color: #555;
        margin-top: 30px;
        line-height: 1.8;
    }

    .blink {
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
    }

    @media (max-width: 768px) {
        .header-container {
            flex-direction: column;
            padding: 10px;
        }

        h1 {
            max-width: 100%;
            margin-bottom: 10px;
        }

        .tracker-container {
            padding: 25px;
        }
    }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>GYM TRACKER</h1>
        <div class="header-button-container">
            <button class="btn btn-layered-3d btn-layered-3d--pink header-btn" onclick="window.location.href='index.html'">
                Home
            </button>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="tracker-container">
            
            <h2 class="tracker-title">status: inactive</h2>
            
            <p class="main-counter-label">days since i last saw the inside of a gym</p>
            <div class="main-counter" id="days-counter">0</div>
            <p class="counter-unit">days</p>
            
            <div class="divider"></div>
            
            <div class="snack-section">
                <p class="snack-label">snacks consumed in that time</p>
                <div class="snack-counter" id="snack-counter">0</div>
            </div>
            
            <p class="status-text">
                gym membership: expired<span class="blink">_</span>
            </p>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set the date you stopped going to gym
            const lastGymDate = new Date(2025, 2, 15); // March 15, 2025
            
            function calculateDaysSinceGym() {
                const now = new Date();
                const timeDiff = now - lastGymDate;
                return Math.max(0, Math.floor(timeDiff / (1000 * 60 * 60 * 24)));
            }
            
            function updateCounter() {
                const daysSince = calculateDaysSinceGym();
                document.getElementById('days-counter').textContent = daysSince;
                
                // Calculate realistic snack count (approx 3-4 snacks per day)
                const baseSnacks = daysSince * 3;
                document.getElementById('snack-counter').textContent = baseSnacks;
            }
            
            updateCounter();
            
            // Slowly increment snack counter (every 30 seconds)
            setInterval(() => {
                const snackEl = document.getElementById('snack-counter');
                const current = parseInt(snackEl.textContent);
                snackEl.textContent = current + 1;
            }, 30000);
        });
    </script>
</body>
</html>
